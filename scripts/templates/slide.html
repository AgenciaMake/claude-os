<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
<style>
  :root {
    --lime: #D6DE23;
    --green2: #00A652;
    --dark-green: #006838;
    --black: #000000;
    --text-dark: #434244;
    --white: #FFFFFF;
    --bg-white: #DEDEDE;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1080px;
    height: 1350px;
    font-family: 'Rubik', sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .slide {
    position: relative;
    width: 1080px;
    height: 1350px;
    padding: 85px 95px 95px 95px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    overflow: hidden;
  }

  /* Backgrounds */
  .bg-black       { background: var(--black);       color: var(--white); }
  .bg-dark-gray   { background: var(--text-dark);   color: var(--white); }
  .bg-light-gray  { background: var(--bg-white);    color: var(--text-dark); }
  .bg-lime        { background: var(--lime);        color: var(--text-dark); }
  .bg-green2      { background: var(--green2);      color: var(--white); }

  /* Faixa lateral direita (cor = próximo slide) */
  .side-strip {
    position: absolute;
    top: 0;
    right: 0;
    width: 38px;
    height: 100%;
    z-index: 3;
  }
  .side-strip.lime        { background: var(--lime); }
  .side-strip.black       { background: var(--black); }
  .side-strip.dark-gray   { background: var(--text-dark); }
  .side-strip.light-gray  { background: var(--bg-white); }
  .side-strip.green2      { background: var(--green2); }

  /* Seta dentro da faixa, próxima ao rodapé */
  .side-strip .arrow {
    position: absolute;
    bottom: 95px;
    left: 50%;
    transform: translateX(-50%);
    width: 0; height: 0;
    border-top: 17px solid transparent;
    border-bottom: 17px solid transparent;
    border-left: 22px solid;
  }
  .side-strip.lime .arrow        { border-left-color: var(--text-dark); }
  .side-strip.black .arrow       { border-left-color: var(--lime); }
  .side-strip.dark-gray .arrow   { border-left-color: var(--lime); }
  .side-strip.light-gray .arrow  { border-left-color: var(--text-dark); }
  .side-strip.green2 .arrow      { border-left-color: var(--lime); }

  /* Hashtag topo-esquerdo (capas) */
  .hashtag {
    position: absolute;
    top: 65px;
    left: 95px;
    font-size: 22px;
    font-weight: 400;
    font-style: italic;
    z-index: 5;
    letter-spacing: 0;
  }
  .hashtag strong { font-weight: 700; font-style: italic; }

  /* Numeração slides internos (canto superior esquerdo) */
  .slide-num {
    position: absolute;
    top: 60px;
    left: 95px;
    border: 1.5px solid currentColor;
    padding: 6px 16px;
    font-size: 18px;
    font-weight: 400;
    font-style: italic;
    min-width: 52px;
    text-align: center;
    z-index: 5;
  }

  /* Selo Make topo-direito (capas) */
  .logo-top {
    position: absolute;
    top: 60px;
    right: 95px;
    width: 140px;
    height: 140px;
    z-index: 5;
  }
  .logo-top img { width: 100%; height: 100%; object-fit: contain; }

  /* Rodapé */
  .footer {
    position: absolute;
    bottom: 65px;
    left: 95px;
    right: 160px; /* espaço da faixa lateral */
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 18px;
    z-index: 5;
    font-weight: 400;
  }
  .footer .handle { font-style: italic; font-weight: 500; }
  .footer .signature { font-weight: 400; }
  .footer .signature em { font-weight: 700; font-style: italic; }

  /* Conteúdo central */
  .content {
    position: relative;
    z-index: 2;
    width: 100%;
  }

  /* Helpers tipográficos — pesos MEDIUM/BOLD, NUNCA Black */
  .h1 {
    font-size: 120px;
    font-weight: 700;
    line-height: 0.98;
    letter-spacing: -3px;
  }
  .h2 {
    font-size: 88px;
    font-weight: 700;
    line-height: 1.0;
    letter-spacing: -2px;
  }
  .h3 {
    font-size: 64px;
    font-weight: 700;
    line-height: 1.05;
    letter-spacing: -1px;
  }
  .h-setup {
    font-size: 64px;
    font-weight: 500;
    line-height: 1.05;
    letter-spacing: -1px;
  }
  .body-lg {
    font-size: 34px;
    font-weight: 400;
    line-height: 1.3;
  }
  .body-md {
    font-size: 26px;
    font-weight: 400;
    line-height: 1.35;
  }
  .italic   { font-style: italic; }
  .bold     { font-weight: 700; }
  .medium   { font-weight: 500; }
  .regular  { font-weight: 400; }
  .lime     { color: var(--lime); }
  .green2   { color: var(--green2); }
  .white    { color: var(--white); }
  .black    { color: var(--black); }
  .dark     { color: var(--text-dark); }
  .muted    { opacity: 0.55; }
  .outline-text {
    -webkit-text-stroke: 2px currentColor;
    color: transparent;
  }

  /* CTA especial */
  .cta-title {
    font-size: 48px;
    font-weight: 700;
    font-style: italic;
    text-transform: uppercase;
    text-align: center;
    line-height: 1.15;
    margin-bottom: 45px;
  }
  .cta-actions {
    display: flex;
    flex-direction: column;
    gap: 16px;
    align-items: center;
    margin-bottom: 60px;
  }
  .cta-pill {
    background: var(--black);
    color: var(--white);
    padding: 20px 42px;
    font-size: 30px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: inline-flex;
    align-items: center;
    gap: 14px;
  }
  .cta-logo { display: flex; justify-content: center; margin-top: 10px; }
  .cta-logo img { width: 180px; height: 180px; }
</style>
</head>
<body>
  <div class="slide {{BG_CLASS}}">
    {{TOP_LEFT}}
    {{TOP_RIGHT}}
    <div class="content">
      {{CONTENT}}
    </div>
    {{FOOTER}}
    {{SIDE_STRIP}}
  </div>
</body>
</html>
